spring:
  application:
    name: hoppin

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

openai:
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
app:
  backend-base-url: ${BACKEND_BASE_URL}
  frontend-base-url: ${FRONTEND_BASE_URL}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

instagram:
  oauth:
    client-id: ${INSTAGRAM_CLIENT_ID}
    client-secret: ${INSTAGRAM_CLIENT_SECRET}
    redirect-uri: ${INSTAGRAM_REDIRECT_URI}
    token-url: https://api.instagram.com/oauth/access_token
    long-lived-token-url: https://graph.instagram.com/access_token
    refresh-token-url: https://graph.instagram.com/refresh_access_token
  graph:
    base-url: https://graph.instagram.com/v22.0