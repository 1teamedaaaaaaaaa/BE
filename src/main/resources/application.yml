spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

app:
  backend-base-url: "http://localhost:8080"
  frontend-base-url: "http://localhost:5173"

instagram:
  oauth:
    client-id: ${INSTAGRAM_CLIENT_ID}
    client-secret: ${INSTAGRAM_CLIENT_SECRET}
    redirect-uri: ${INSTAGRAM_REDIRECT_URI}
    token-url: https://api.instagram.com/oauth/access_token
    long-lived-token-url: https://graph.instagram.com/access_token
    refresh-token-url: https://graph.instagram.com/refresh_access_token
  graph:
    base-url: https://graph.instagram.com/v22.0